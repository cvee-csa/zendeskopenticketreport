name:  Zendesk Report for ESC/RARC Open Tickets 

on:
  # Schedule is driven externally via cron-job.org hitting the workflow_dispatch
  # API endpoint — more reliable than GitHub's built-in schedule trigger.
  # Target times: 8:00 AM and 4:00 PM Pacific, Mon–Fri.
  # API endpoint to call:
  #   POST https://api.github.com/repos/cvee-csa/zendeskopenticketreport/actions/workflows/zendeskreport_esc-rarc.yml/dispatches
  #   Body: {"ref": "main"}
  #   Header: Authorization: Bearer <fine-grained PAT with Actions:Write>

  # Also runnable manually from the Actions tab at any time.
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          # Email is optional — add these secrets later to enable delivery
          # GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          # GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python zendeskreport_opentickets_esc-rarc_bidaily.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT_Ops_Tag_Report_${{ github.run_id }}
          path: /tmp/IT_Ops_Tag_Report_*.xlsx
          retention-days: 30

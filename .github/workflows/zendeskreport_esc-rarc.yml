name: SLA Breach Report

on:
  # Schedule is driven externally via cron-job.org hitting the workflow_dispatch
  # API endpoint — more reliable than GitHub's built-in schedule trigger.
  # Target times: 8:00 AM and 4:00 PM Pacific, Mon-Fri.
  # API endpoint to call:
  #   POST https://api.github.com/repos/cvee-csa/zendeskopenticketreport/actions/workflows/zendeskreport_esc-rarc.yml/dispatches
  #   Body: {"ref": "main"}
  #   Header: Authorization: Bearer <fine-grained PAT with Actions:Write>

  # Also runnable manually from the Actions tab at any time.
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SLA breach report
        env:
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python sla_breach_report.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT_Ops_SLA_Report_${{ github.run_id }}
          path: /tmp/IT_Ops_SLA_Report_*.xlsx
          retention-days: 30

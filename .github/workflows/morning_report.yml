name: IT Ops Morning Tag Report

on:
  schedule:
    # All times in UTC. Pacific time offsets:
    #   PST (Nov–Mar): UTC-8  |  PDT (Mar–Nov): UTC-7
    #
    #  8:00 AM PDT = 15:00 UTC  |  8:00 AM PST = 16:00 UTC
    #  4:00 PM PDT = 23:00 UTC  |  4:00 PM PST = 00:00 UTC (next day, use "0 0 * * 2-6")
    #
    # Current schedule (PDT — active mid-Mar through early-Nov):
    - cron: "0 15 * * 1-5"   # 8:00 AM PDT, Mon–Fri
    - cron: "0 23 * * 1-5"   # 4:00 PM PDT, Mon–Fri
    # Winter schedule (PST — swap in early-Nov through mid-Mar):
    # - cron: "0 16 * * 1-5"  # 8:00 AM PST
    # - cron: "0 0 * * 2-6"   # 4:00 PM PST (midnight UTC = prev day 4 PM)

  # Run manually at any time from the Actions tab — useful for testing
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          # Email is optional — add these secrets later to enable delivery
          # GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          # GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python zendeskreport_opentickets_esc-rarc_bidaily.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT_Ops_Tag_Report_${{ github.run_id }}
          path: /tmp/IT_Ops_Tag_Report_*.xlsx
          retention-days: 30

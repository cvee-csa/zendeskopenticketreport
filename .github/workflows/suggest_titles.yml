name: IT Ops Zendesk Title Editor

on:
  # Run manually from the Actions tab whenever needed
  workflow_dispatch:

jobs:
  suggest-titles:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate title suggestions
        env:
          ZENDESK_EMAIL:               ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN:               ${{ secrets.ZENDESK_TOKEN }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID:            ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python suggest_titles.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT_Ops_Title_Suggestions_${{ github.run_id }}
          path: /tmp/IT_Ops_Title_Suggestions_*.xlsx
          retention-days: 30
